<!DOCTYPE html>
<html>
<head>
    <title>SmartCampus Analytics Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        
        /* Dashboard Grid Layout */
        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card Styling */
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h2 { margin-top: 0; font-size: 1.2rem; color: #0056b3; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }

        /* Table Styling */
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.9rem; }
        th { background-color: #f8f9fa; color: #333; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>

    <h1>SmartCampus Operations Dashboard</h1>

    <div class="dashboard-container">
        
        <!-- Panel 1: Enrolment -->
        <div class="card">
            <h2>Programme Enrolment</h2>
            <table>
                <thead><tr><th>Programme Name</th><th>Student Count</th></tr></thead>
                <tbody id="enrolment-body"><tr><td colspan="2">Loading...</td></tr></tbody>
            </table>
        </div>

        <!-- Panel 2: Course Trends -->
        <div class="card">
            <h2>Course Add/Drop Trends</h2>
            <table>
                <thead><tr><th>Course</th><th>Adds</th><th>Drops</th></tr></thead>
                <tbody id="course-body"><tr><td colspan="3">Loading...</td></tr></tbody>
            </table>
        </div>

        <!-- Panel 3: Library Usage -->
        <div class="card">
            <h2>Library & Facility Usage</h2>
            <table>
                <thead><tr><th>Resource</th><th>Type</th><th>Usage</th><th>Peak Time</th></tr></thead>
                <tbody id="library-body"><tr><td colspan="4">Loading...</td></tr></tbody>
            </table>
        </div>

        <!-- Panel 4: Notification Metrics -->
        <div class="card">
            <h2>Notification Response Rates</h2>
            <table>
                <thead><tr><th>Alert Type</th><th>Sent</th><th>Actioned</th><th>Rate</th></tr></thead>
                <tbody id="notification-body"><tr><td colspan="4">Loading...</td></tr></tbody>
            </table>
        </div>

    </div>

    <script>
        // Fetch Enrolment Data
        fetch('/api/reports/enrolment-by-programme')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(item => html += `<tr><td>${item.programmeName}</td><td>${item.studentCount}</td></tr>`);
                document.getElementById('enrolment-body').innerHTML = html;
            });

        // Fetch Course Analytics
        fetch('/api/reports/course-analytics')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(item => html += `<tr><td>${item.courseName}</td><td style="color:green;">+${item.addCount}</td><td style="color:red;">-${item.dropCount}</td></tr>`);
                document.getElementById('course-body').innerHTML = html;
            });

        // Fetch Library Usage
        fetch('/api/reports/library-usage')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(item => html += `<tr><td>${item.resourceName}</td><td>${item.resourceType}</td><td>${item.usagePercentage}%</td><td>${item.peakTime}</td></tr>`);
                document.getElementById('library-body').innerHTML = html;
            });

        // Fetch Notification Analytics
        fetch('/api/reports/notification-analytics')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(item => html += `<tr><td>${item.alertType}</td><td>${item.sentCount}</td><td>${item.actionedCount}</td><td><strong>${item.responseRate}</strong></td></tr>`);
                document.getElementById('notification-body').innerHTML = html;
            });
    </script>
</body>
</html>
