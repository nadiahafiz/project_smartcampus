<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCampus - Notification Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">SmartCampus Live System Notification Log</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card p-4 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Active System Logs</h5>
                        <span class="badge bg-success">Live Monitoring Online</span>
                    </div>
                    <hr>
                    <div id="alertsStream">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:8083/api/notifications';

        // Fetch logs on page load
        document.addEventListener('DOMContentLoaded', fetchLogs);

        // Auto-refresh the logs every 3 seconds so you see microservice hits live!
        setInterval(fetchLogs, 3000);

        async function fetchLogs() {
            try {
                const res = await fetch(BACKEND_URL);
                if (res.ok) {
                    const logs = await res.json();
                    const stream = document.getElementById('alertsStream');
                    
                    if(logs.length === 0) {
                        stream.innerHTML = `<p class="text-muted text-center py-5">No broadcast alerts inside the database yet.</p>`;
                        return;
                    }

                    let streamHTML = '';
                    // Loop backward so newest alerts stay at the top
                    logs.reverse().forEach(log => {
                        let badgeColor = 'bg-secondary text-white';
                        
                        if (log.alertType === 'Library Booking') {
                            badgeColor = 'bg-info text-dark';
                        } else if (log.alertType === 'Course Enrolment') {
                            badgeColor = 'bg-warning text-dark';
                        }
                        
                        streamHTML += `
                            <div class="alert alert-secondary shadow-sm mb-3 border-start border-4 border-dark">
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="badge ${badgeColor} mb-2">${log.alertType}</span>
                                    <small class="fw-bold text-secondary">Target Student: ${log.studentId}</small>
                                </div>
                                <p class="mb-0 text-dark fw-semibold">${log.message}</p>
                            </div>
                        `;
                    });
                    stream.innerHTML = streamHTML;
                }
            } catch (err) {
                console.error("Failed to read system stream:", err);
            }
        }
    </script>
</body>
</html>
