# Set the port to 8083 so it runs independently from your other services
server.port=8083

# Configure the H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:notificationdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Allow the H2 web console interface to be accessed in the browser
spring.h2.console.enabled=true

# Show SQL statements in the console for easy debugging
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update